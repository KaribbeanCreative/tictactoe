<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Tic Toe Clash</title>
  </head>

  <body>
    <h1>Tic Toe Clash</h1>

    <div class="scoreboard">
      <div class="score score-x">
        <span class="score-label">Player X</span>
        <span class="score-value" id="score-x">0</span>
      </div>
      <div class="objectif">🏆<br />5</div>
      <div class="score score-o">
        <span class="score-label">Player O</span>
        <span class="score-value" id="score-o">0</span>
      </div>
    </div>

    <div class="tictactoe">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <h2 class="info"></h2>
    <button id="restart">Restart</button>

    <!-- Victory overlay -->
    <div class="overlay" id="overlay">
      <div class="confetti-container" id="confetti"></div>
      <div class="victory-card">
        <div class="trophy">🏆</div>
        <h2 class="victory-title" id="victory-title"></h2>
        <button id="new-match">New match</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
